<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5° ANIVERSARIO</title>
    <style>
        :root {
            --bg-page: linear-gradient(135deg, #FFF0F5 0%, #FDE4ED 50%, #F5D6E1 100%);
            --card-bg: rgba(255, 255, 255, 0.92);
            --primary: #A8546C;
            --primary-hover: #94445A;
            --primary-soft: #C98CA0;
            --text-main: #2D1F24;
            --text-muted: #847277;
            --border-color: rgba(168, 84, 108, 0.14);
            --shadow-sm: 0 4px 15px rgba(168, 84, 108, 0.05);
            --shadow-md: 0 10px 25px -5px rgba(168, 84, 108, 0.09);
            --shadow-lg: 0 16px 32px -8px rgba(168, 84, 108, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-page);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px 20px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* === HEADER GLOBAL === */
        .global-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 28px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--shadow-sm);
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2D1F24 0%, #A8546C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .coins-counter {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #FFF0F3, #FFE3EC);
            padding: 10px 22px;
            border-radius: 30px;
            border: 2px solid #D6879E;
            box-shadow: 0 4px 15px rgba(168, 84, 108, 0.15);
        }

        .coins-icon {
            font-size: 1.6rem;
            animation: coinPulse 1.5s ease-in-out infinite;
        }

        @keyframes coinPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.18) rotate(6deg); }
        }

        /* === ANIMACIÓN DE BRILLO CROMADO === */
        @keyframes shimmerShine {
            0% {
                background: linear-gradient(90deg, #FFF0F5 0%, #FFF0F5 40%, rgba(255,255,255,0.8) 50%, #FFF0F5 60%, #FFF0F5 100%);
                background-size: 200% 100%;
                background-position: 200% 0;
            }
            50% {
                background: linear-gradient(90deg, #FFF0F5 0%, #FFF0F5 40%, rgba(255,255,255,0.9) 50%, #FFF0F5 60%, #FFF0F5 100%);
                background-size: 200% 100%;
                background-position: -200% 0;
            }
            100% {
                background: linear-gradient(90deg, #FFF0F5 0%, #FFF0F5 40%, rgba(255,255,255,0.8) 50%, #FFF0F5 60%, #FFF0F5 100%);
                background-size: 200% 100%;
                background-position: 200% 0;
            }
        }

        .coins-value {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--primary);
            min-width: 50px;
        }

        /* === NAVEGACIÓN (TABS) === */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 20px rgba(0,0,0, 0.02);
        }

        .nav-tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.8);
            color: var(--primary);
        }

        .nav-tab.active {
            color: #FFFFFF;
            background: linear-gradient(135deg, var(--primary), #BD6B82);
            box-shadow: 0 6px 18px rgba(168, 84, 108, 0.28);
            transform: translateY(-1px);
        }

        /* === SECCIONES === */
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.35s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === LOGROS === */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .achievement-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 22px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
        }

        .achievement-card:hover {
            border-color: var(--primary-soft);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .achievement-card.unlocked {
            background: #FFFFFF;
            border: 1.5px solid var(--primary);
            animation: shimmerShine 2.5s ease-in-out infinite;
        }

        .achievement-card.locked {
            background: rgba(255, 255, 255, 0.65);
        }

        .achievement-card.hidden-achievement {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(168, 84, 108, 0.08);
        }

        .achievement-card.hidden-achievement .badge-container {
            filter: blur(4px);
            background: #2a2a2a;
            border-color: #404040;
        }

        .achievement-card.hidden-achievement .achievement-description {
            filter: blur(5px);
            user-select: none;
            color: rgba(132, 114, 119, 0.5);
        }

        .achievement-card.hidden-achievement.unlocked .achievement-description {
            filter: none;
            color: var(--text-muted);
        }

        .image-container {
            width: 100%;
            height: 150px;
            background: #FFF5F7;
            border: 1.5px dashed #E2B6C3;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
        }

        .hidden-achievement .image-container {
            background: #FFF0F5 !important;
        }

        .image-container img {
            width: 100%;
            height: 100%; object-fit: cover; border-radius: 10px;
        }

        .image-container.no-image {
            color: #A38C93;
            font-size: 0.85rem; font-weight: 500;
        }

        .image-input-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0; opacity: 0; cursor: pointer; z-index: 10;
        }

        /* === NUEVOS ESTILOS PARA INSIGNIAS CIRCULARES Y DESENFOCADAS === */
        .badge-container {
            position: relative;
            width: 54px;
            height: 54px;
            margin-right: 14px;
            flex-shrink: 0;
            border-radius: 50%;
            background: #FFF0F5;
            border: 2px solid #E2B6C3;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .badge-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: linear-gradient(90deg, transparent 0%, transparent 40%, rgba(255,255,255,0) 50%, transparent 60%, transparent 100%);
            background-size: 200% 100%;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .achievement-card.unlocked .badge-container::after {
            animation: shimmerShine 3s ease-in-out infinite;
            opacity: 0.6;
        }

        .achievement-card.locked .badge-container {
            filter: brightness(0.6) grayscale(100%);
        }

        .achievement-card.unlocked .badge-container {
            box-shadow: inset 0 2px 12px rgba(255, 255, 255, 0.4), 0 4px 12px rgba(168, 84, 108, 0.2);
        }

        .achievement-card.unlocked .badge-container img {
            filter: saturate(1.4) brightness(1.15) contrast(1.1);
        }

        .achievement-card.hidden-achievement .badge-container {
            filter: blur(5px) brightness(0.6) grayscale(100%);
            background: #2a2a2a;
            border-color: #404040;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .achievement-card.hidden-achievement .badge-container::after {
            animation: none !important;
            opacity: 0 !important;
        }

        .achievement-card.hidden-achievement.unlocked .badge-container {
            filter: none;
            background: #FFF0F5;
            border-color: #E2B6C3;
            box-shadow: inset 0 2px 12px rgba(255, 255, 255, 0.4), 0 4px 12px rgba(168, 84, 108, 0.2);
        }

        .achievement-card.hidden-achievement.unlocked .badge-container::after {
            animation: shimmerShine 3s ease-in-out infinite;
            opacity: 0.6;
        }

        .badge-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-input {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 20;
            border-radius: 50%;
        }

        .achievement-content {
            display: flex;
            align-items: flex-start;
        }

        .achievement-text {
            flex: 1;
        }

        .achievement-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .achievement-card.locked .achievement-title {
            color: #A8A39C;
            font-weight: 600;
        }

        .achievement-title:hover {
            color: var(--primary);
        }

        .achievement-title input {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid var(--primary-soft);
            border-radius: 6px;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
        }

        .achievement-description {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1.4;
        }

        .achievement-card.locked .achievement-description {
            color: #A8959B;
        }

        .achievement-description:hover {
            color: var(--primary);
        }

        .achievement-description input {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid var(--primary-soft);
            border-radius: 6px;
            font-family: inherit;
            font-size: inherit;
        }

        .achievement-checkbox {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .achievement-reward {
            display: inline-block;
            background: linear-gradient(135deg, #FFF0F3, #FFE3EC);
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 12px;
            border: 1px solid #D6879E;
        }

        /* === TAREAS === */
        .tasks-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .task-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
        }

        .task-card:hover {
            border-color: var(--primary-soft);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .task-card.completed {
            background: #FFFFFF;
            border: 1.5px solid var(--primary);
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
            opacity: 0.7;
        }

        .task-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }

        .task-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            transition: color 0.2s;
            flex: 1;
        }

        .task-title:hover {
            color: var(--primary);
        }

        .task-title input {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid var(--primary-soft);
            border-radius: 6px;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
        }

        .task-description {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1.4;
        }

        .task-description:hover {
            color: var(--primary);
        }

        .task-description input {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid var(--primary-soft);
            border-radius: 6px;
            font-family: inherit;
            font-size: inherit;
        }

        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .task-reward {
            display: inline-block;
            background: linear-gradient(135deg, #FFF0F3, #FFE3EC);
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #D6879E;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        /* === TIENDA === */
        .shop-header {
            margin-bottom: 24px;
        }

        .shop-info {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .shop-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
            position: relative;
        }

        .shop-item:hover:not(.purchased) {
            border-color: var(--primary-soft);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .shop-item.purchased {
            background: #F8F5F5;
            border-color: var(--primary);
            opacity: 0.75;
        }

        .purchased-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--primary);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            z-index: 5;
        }

        .shop-item-image {
            width: 100%;
            height: 140px;
            background: #FFF5F7;
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
            cursor: default;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
        }

        .shop-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .shop-item-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .shop-item-name:hover {
            color: var(--primary);
        }

        .shop-item-name input {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid var(--primary-soft);
            border-radius: 6px;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
        }

        .shop-item-description {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1.4;
        }

        .shop-item-description:hover {
            color: var(--primary);
        }

        .shop-item-description input {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid var(--primary-soft);
            border-radius: 6px;
            font-family: inherit;
            font-size: inherit;
        }

        .shop-item-price {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .buy-button {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--primary), #BD6B82);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 15px rgba(168, 84, 108, 0.2);
        }

        .buy-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 84, 108, 0.3);
        }

        .buy-button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* === MODAL === */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .modal-message {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .modal-button {
            background: linear-gradient(135deg, var(--primary), #BD6B82);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 15px rgba(168, 84, 108, 0.2);
        }

        .modal-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 84, 108, 0.3);
        }

        /* === ANIMACIÓN DE MONEDAS === */
        .coin-animation {
            position: fixed;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
            pointer-events: none;
            z-index: 999;
            animation: coinFloat 1.5s ease-out forwards;
        }

        @keyframes coinFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(0.8);
            }
        }

        /* === RULETA === */
        .wheel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .wheel-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .wheel-container {
            background: white;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.4s ease;
        }

        .wheel-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        .wheel-canvas {
            margin: 0 auto 24px;
            max-width: 300px;
        }

        .spin-button {
            background: linear-gradient(135deg, var(--primary), #BD6B82);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(168, 84, 108, 0.25);
            margin-bottom: 16px;
        }

        .spin-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(168, 84, 108, 0.35);
        }

        .spin-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .wheel-prize {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 16px;
            min-height: 30px;
        }

        .close-wheel {
            background: var(--text-muted);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s;
            margin-top: 12px;
        }

        .close-wheel:hover {
            background: var(--primary);
        }

        /* === MODAL DE IMAGEN DE TIENDA === */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;

            display: flex;
            justify-content: center;
            margin-bottom: 20px;

            position: relative;
            width: 180px;
            height: 180px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.92);

            box-shadow: 0 8px 32px rgba(168, 84, 108, 0.15);
            transition: all 0.3s ease;
            overflow: hidden;
            /* Forma de corazón */
            clip-path: polygon(
                50% 100%,
                100% 50%,
                100% 38%,
                85% 23%,
                70% 15%,
                50% 28%,
                30% 15%,
                15% 23%,
                0% 38%,
                0% 50%
            );
        }

        .heart:hover {
            border-color: var(--primary);
            box-shadow: 0 12px 40px rgba(168, 84, 108, 0.25);
            transform: scale(1.08);
        }

        .heart-placeholder {
            font-size: 6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            animation: none;
        }

        .heart img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            clip-path: polygon(
                50% 100%,
                100% 50%,
                100% 38%,
                85% 23%,
                70% 15%,
                50% 28%,
                30% 15%,
                15% 23%,
                0% 38%,
                0% 50%
            );
        }

        .heart-input {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        /* Animación de latido LENTO - Solo si tiene imagen */
        .heart.with-image {
            animation: heartbeatSlow 1.8s ease-in-out infinite, shimmerShine 2.5s ease-in-out infinite;
        }

        @keyframes heartbeatSlow {
            0% {
                transform: scale(1);
            }
            15% {
                transform: scale(1.15);
            }
            30% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.18);
            }
            60% {
                transform: scale(1);
            }
            100% {
                transform: scale(1);
            }

        .heart-label {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

            display: none;

<body>
    <div class="container">

        // Inicializar datos
        function loadData() {
            achievements = JSON.parse(localStorage.getItem('achievements_complete_v1')) || defaultAchievements;

            shopItems = JSON.parse(localStorage.getItem('shop_v1')) || defaultShop;
            spentCoins = JSON.parse(localStorage.getItem('spent_coins_v1')) || 0;
        }

        function saveData(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        function updateAllDisplay() {
            updateAchievements();
            updateTasks();
            updateShop();
            updateCoinsDisplay();
            checkCompletions();

        function updateCoinsDisplay() {
            const totalCoins = getTotalCoins();
            document.getElementById('coinsDisplay').textContent = totalCoins;
        }

        function updateAchievements() {
            const grid = document.getElementById('achievementsGrid');
            grid.innerHTML = '';

            achievements.forEach((achievement, index) => {
                const card = document.createElement('div');
                card.className = `achievement-card ${achievement.unlocked ? 'unlocked' : 'locked'} ${achievement.hidden && !achievement.unlocked ? 'hidden-achievement' : ''}`;

                const imageSrc = achievement.image || null;
                const imageHTML = imageSrc 
                    ? `<img src="${imageSrc}" alt="Achievement">`
                    : `<span style="color: #968389; font-size: 2.5rem;">◼️</span>`;

                const badgeSrc = achievement.badgeUrl || null;
                const badgeHTML = badgeSrc
                    ? `<img src="${badgeSrc}" alt="Badge">`
                    : `<span style="font-size: 1.8rem;">⭐</span>`;

                card.innerHTML = `
                    <div class="achievement-content">
                        <div class="badge-container">
                            ${badgeHTML}

                        <div class="achievement-text">

                            <div class="achievement-description">${achievement.description}</div>

        function updateTasks() {
            const grid = document.getElementById('tasksGrid');
            grid.innerHTML = '';

            tasks.forEach((task, index) => {
                const card = document.createElement('div');
                card.className = `task-card ${task.completed ? 'completed' : ''}`;

                card.innerHTML = `
                    <div class="task-header">
                        <div class="task-title">${task.title}</div>
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index}, this)">

                const imageHTML = imageSrc 
                    ? `<img src="${imageSrc}" alt="${item.name}">`
                    : `<span style="color: #968389; font-size: 3rem;">📦</span>`;

                card.innerHTML = `
                    ${item.purchased ? '<div class="purchased-badge">✓ Comprado</div>' : ''}
                    <div class="shop-item-image ${!imageSrc ? '' : ''}">
                        ${imageHTML}
                    </div>
                    <div class="shop-item-name">${item.name}</div>
                    <div class="shop-item-description">${item.description}</div>
                    <div class="shop-item-price">
                        <span>🟡 ${item.price}</span>
                    </div>
                    <button class="buy-button" onclick="buyItem(${index})" ${item.purchased || totalCoins < item.price ? 'disabled' : ''}>
                        ${item.purchased ? 'Comprado' : 'Comprar'}
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function getTotalCoins() {
            const achievementCoins = achievements.filter(a => a.unlocked).length * COINS_PER_ACHIEVEMENT;
            const tasksCoins = tasks.filter(t => t.completed).reduce((sum, t) => sum + t.reward, 0);
            return achievementCoins + tasksCoins - spentCoins;
        }

        function toggleAchievement(index, checkbox) {
            achievements[index].unlocked = checkbox.checked;
            if (checkbox.checked) animateCoins(checkbox, COINS_PER_ACHIEVEMENT);
            saveData('achievements_complete_v1', achievements);
            updateAllDisplay();
        }

        function toggleTask(index, checkbox) {
            tasks[index].completed = checkbox.checked;

            saveData('tasks_v1', tasks);

        }

        function buyItem(index) {
            const totalCoins = getTotalCoins();
            if (totalCoins >= shopItems[index].price && !shopItems[index].purchased) {
                spentCoins += shopItems[index].price;
                shopItems[index].purchased = true;
                saveData('shop_v1', shopItems);
                saveData('spent_coins_v1', spentCoins);
                showModal('Compra Exitosa', `¡Obtuviste "${shopItems[index].name}"! ¡¡WAOUSSS!!`);
                updateAllDisplay();
            }
        }

            const rect = element.getBoundingClientRect();
            const coin = document.createElement('div');
            coin.className = 'coin-animation';

            coin.style.left = rect.left + 'px';
            coin.style.top = rect.top + 'px';
            document.body.appendChild(coin);
            setTimeout(() => coin.remove(), 1500);
        }

        // ===== FUNCIONES DE RULETA =====
        let wheelSpinning = false;
        const wheelPrizes = [
            { emoji: '🟣', text: 'RECUERDO CHISTOSO', bonus: 50 },
            { emoji: '🟤', text: 'HISTORIA TRAUMATICA', bonus: 0 },
            { emoji: '🔴', text: 'HISTORIA DE PASCUA', bonus: 100 },
            { emoji: '🔵', text: 'HISTORIA INCOMODA', bonus: 0 },
            { emoji: '🟠', text: 'RECUERDO DE NAVIDAD', bonus: 75 },
            { emoji: '🟢', text: 'RECUERDO EXTRAÑO', bonus: 25 },
        ];

        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const radius = canvas.width / 2;
            const sliceAngle = (Math.PI * 2) / wheelPrizes.length;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            wheelPrizes.forEach((prize, index) => {
                const startAngle = sliceAngle * index;
                const endAngle = sliceAngle * (index + 1);

                // Colores alternados
                const colors = ['#FFB6D9', '#A8546C', '#FFD6E8', '#C98CA0', '#FFF0F5', '#E8B5CF'];
                ctx.fillStyle = colors[index % colors.length];
                ctx.beginPath();
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.lineTo(radius, radius);
                ctx.fill();

                // Borde
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.lineTo(radius, radius);
                ctx.stroke();

                // Texto
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 14px Arial';
                ctx.fillText(prize.emoji, radius - 20, 5);
                ctx.restore();
            });

            // Punta de arriba
            ctx.fillStyle = '#A8546C';
            ctx.beginPath();
            ctx.moveTo(radius - 10, 0);
            ctx.lineTo(radius + 10, 0);
            ctx.lineTo(radius, 15);
            ctx.fill();
        }

        function spinWheel() {
            if (wheelSpinning) return;
            wheelSpinning = true;

            const canvas = document.getElementById('wheelCanvas');
            let rotation = 0;
            const spinButton = document.getElementById('spinButton');
            spinButton.disabled = true;

            const spinDuration = 4000;
            const startTime = Date.now();
            const randomPrizeIndex = Math.floor(Math.random() * wheelPrizes.length);
            const finalRotation = (360 * 5) + (360 - (randomPrizeIndex * (360 / wheelPrizes.length))) % 360;

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / spinDuration, 1);
                
                // Easing: ease-out
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                rotation = finalRotation * easeProgress;

                canvas.style.transform = `rotate(${rotation}deg)`;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    wheelSpinning = false;
                    spinButton.disabled = false;
                    showPrizeResult(randomPrizeIndex);
                }
            }

            animate();
        }

        function showPrizeResult(prizeIndex) {
            const prize = wheelPrizes[prizeIndex];
            const prizeDisplay = document.getElementById('wheelPrize');
            prizeDisplay.textContent = `${prize.emoji} ¡Ganaste! ${prize.text}`;
            
            // Si hay bonus de monedas, agregarlo
            if (prize.bonus > 0) {
                spentCoins = Math.max(0, spentCoins - prize.bonus);
                saveData('spent_coins_v1', spentCoins);
                updateCoinsDisplay();
            }
        }

        function closeWheel() {
            document.getElementById('wheelOverlay').classList.remove('active');
            document.getElementById('wheelPrize').textContent = '';
        }

        function checkCompletions() {
            // Verificar si todos los logros están completados
            const allAchievementsUnlocked = achievements.every(a => a.unlocked);
            if (allAchievementsUnlocked && achievements.length > 0) {
                const hasShownAchievementWheel = localStorage.getItem('shown_achievement_wheel_v1') === 'true';
                if (!hasShownAchievementWheel) {
                    showWheelModal('¡COMPLETASTE TODOS LOS FUKIN LOGROS!');
                    localStorage.setItem('shown_achievement_wheel_v1', 'true');
                    return;
                }
            }

            // Verificar si todas las tareas están completadas
            const allTasksCompleted = tasks.every(t => t.completed);
            if (allTasksCompleted && tasks.length > 0) {
                const hasShownTasksWheel = localStorage.getItem('shown_tasks_wheel_v1') === 'true';
                if (!hasShownTasksWheel) {
                    showWheelModal('¡COMPLETASTE TODAS LAS FUKIN TAREAS!');
                    localStorage.setItem('shown_tasks_wheel_v1', 'true');
                    return;
                }
            }
        }

            drawWheel();
            document.getElementById('spinButton').disabled = false;
            document.getElementById('wheelPrize').textContent = '';
        }

        function confirmReset() {
            // Borrar todos los datos de localStorage
            localStorage.removeItem('achievements_complete_v1');
            localStorage.removeItem('tasks_v1');
            localStorage.removeItem('shop_v1');
            localStorage.removeItem('spent_coins_v1');
            localStorage.removeItem('shown_achievement_wheel_v1');
            localStorage.removeItem('shown_tasks_wheel_v1');
            
            // Cerrar modal
            document.getElementById('resetModal').classList.remove('active');
            
            // Mostrar mensaje y recargar
            showModal('Restablecido...', 'Todos los datos han sido eliminados. La página se recargará ahora.');
            setTimeout(() => {
                location.reload();
            }, 2000);
        }

        // ===== FUNCIÓN CORAZÓN ESPECIAL =====
        function handleHeartUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const heartImage = document.getElementById('heartImage');
                    const heartPlaceholder = heartImage.querySelector('.heart-placeholder');
                    let existingImg = heartImage.querySelector('img');
                    
                    // Guardar en localStorage
                    localStorage.setItem('heart_image_v1', e.target.result);
                    
                    if (existingImg) {
                        // Si ya existe una imagen, reemplazarla
                        existingImg.src = e.target.result;
                    } else {
                        // Si no existe, crear nueva
                        if (heartPlaceholder) {
                            heartPlaceholder.remove();
                        }
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.alt = 'Heart';
                        heartImage.appendChild(img);
                    }
                    
                    // Agregar clase para animación
                    heartImage.classList.add('with-image');
                    
                    // Resetear el input para poder seleccionar el mismo archivo otra vez
                    document.getElementById('heartInput').value = '';
                };
                reader.readAsDataURL(file);
            }
        }

        // Cargar corazón al iniciar
        function loadHeartImage() {
            const savedHeartImage = localStorage.getItem('heart_image_v1');
            if (savedHeartImage) {
                const heartImage = document.getElementById('heartImage');
                const heartPlaceholder = heartImage.querySelector('.heart-placeholder');
                
                if (heartPlaceholder) {
                    heartPlaceholder.remove();
                }
                
                let existingImg = heartImage.querySelector('img');
                if (existingImg) {
                    existingImg.src = savedHeartImage;
                } else {
                    const img = document.createElement('img');
                    img.src = savedHeartImage;
                    img.alt = 'Heart';
                    heartImage.appendChild(img);
                }
                
                heartImage.classList.add('with-image');
            }
        }

        // Inicializar
        loadData();
        loadHeartImage();
        updateAllDisplay();
        drawWheel();
    </script>
