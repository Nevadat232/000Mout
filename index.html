<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Completo de Logros, Tareas y Tienda</title>
    <style>
        :root {
            --bg-page: linear-gradient(135deg, #FFF0F5 0%, #FDE4ED 50%, #F5D6E1 100%);
            --card-bg: rgba(255, 255, 255, 0.92);
            --primary: #A8546C;
            --primary-hover: #94445A;
            --primary-soft: #C98CA0;
            --text-main: #2D1F24;
            --text-muted: #847277;
            --border-color: rgba(168, 84, 108, 0.14);
            --shadow-sm: 0 4px 15px rgba(168, 84, 108, 0.05);
            --shadow-md: 0 10px 25px -5px rgba(168, 84, 108, 0.09);
            --shadow-lg: 0 16px 32px -8px rgba(168, 84, 108, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-page);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px 20px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* === HEADER GLOBAL === */
        .global-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 28px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--shadow-sm);
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2D1F24 0%, #A8546C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .coins-counter {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #FFF0F3, #FFE3EC);
            padding: 10px 22px;
            border-radius: 30px;
            border: 2px solid #D6879E;
            box-shadow: 0 4px 15px rgba(168, 84, 108, 0.15);
        }

        .coins-icon {
            font-size: 1.6rem;
            animation: coinPulse 1.5s ease-in-out infinite;
        }

        @keyframes coinPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.18) rotate(6deg); }
        }

        .coins-value {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--primary);
            min-width: 50px;
        }

        /* === NAVEGACIÓN (TABS) === */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 20px rgba(0,0,0, 0.02);
        }

        .nav-tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.8);
            color: var(--primary);
        }

        .nav-tab.active {
            color: #FFFFFF;
            background: linear-gradient(135deg, var(--primary), #BD6B82);
            box-shadow: 0 6px 18px rgba(168, 84, 108, 0.28);
            transform: translateY(-1px);
        }

        /* === SECCIONES === */
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.35s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === LOGROS === */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .achievement-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 22px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
        }

        .achievement-card:hover {
            border-color: var(--primary-soft);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .achievement-card.unlocked {
            background: #FFFFFF;
            border: 1.5px solid var(--primary);
        }

        .achievement-card.locked {
            background: rgba(255, 255, 255, 0.65);
        }

        .image-container {
            width: 100%;
            height: 150px;
            background: #FFF5F7;
            border: 1.5px dashed #E2B6C3;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
        }

        /* Corrección para sobreescribir el estilo en línea de tu JS */
        .hidden-achievement .image-container {
            background: #FFF0F5 !important;
        }

        .image-container img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 10px;
        }

        .image-container.no-image {
            color: #A38C93; font-size: 0.85rem; font-weight: 500;
        }

        .image-input-wrapper {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0; cursor: pointer; z-index: 10;
        }

        .badge-img {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            object-fit: cover;
            margin-right: 14px;
            flex-shrink: 0;
            transition: filter 0.3s ease;
            background: #F9ECEF;
            padding: 4px;
            border: 1px solid #EAE0E3;
        }

        .achievement-card.locked .badge-img {
            filter: grayscale(1) opacity(0.45);
        }

        .card-content { display: flex; align-items: flex-start; flex: 1; }
        .card-text { flex: 1; min-width: 0; }

        .achievement-title {
            font-size: 1.05rem; font-weight: 700; color: var(--text-main); margin-bottom: 4px;
        }

        .achievement-desc {
            font-size: 0.86rem; color: var(--text-muted); margin-bottom: 16px; line-height: 1.45;
        }

        .achievement-stats {
            display: flex; justify-content: space-between; align-items: center; padding-top: 14px; border-top: 1px solid #F5EBEF; font-size: 0.85rem; font-weight: 600; color: var(--primary); margin-top: auto;
        }

        .checkbox { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }

        .locked-overlay {
            position: absolute; top: 14px; right: 14px; background: #F4E3E8; color: #9C6C7B; padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; z-index: 5;
        }

        .achievement-card.unlocked .locked-overlay { display: none; }

        /* === TAREAS === */
        .tasks-banner {
            background: linear-gradient(135deg, #A8546C 0%, #BA6A81 50%, #CD8398 100%);
            color: #FFFFFF;
            padding: 32px 28px;
            border-radius: 22px;
            margin-bottom: 35px;
            box-shadow: 0 12px 30px rgba(168, 84, 108, 0.28);
            position: relative;
            overflow: hidden;
            border: none;
        }

        .tasks-banner::after {
            content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; pointer-events: none;
        }

        .banner-title { font-size: 1.9rem; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
        .banner-subtitle { font-size: 0.95rem; opacity: 0.9; margin-bottom: 22px; }

        .banner-stats {
            display: flex; gap: 28px; flex-wrap: wrap; background: rgba(0,0,0,0.12); padding: 14px 20px; border-radius: 14px; backdrop-filter: blur(4px);
        }

        .stat-item { display: flex; align-items: center; gap: 8px; font-size: 0.92rem; }
        .stat-value { font-weight: 800; font-size: 1.25rem; color: #FFF; }

        .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .task-card {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; transition: all 0.25s ease; box-shadow: var(--shadow-md); display: flex; flex-direction: column; justify-content: space-between; cursor: pointer;
        }

        .task-card:hover {
            border-color: var(--primary-soft); box-shadow: var(--shadow-lg); transform: translateY(-3px);
        }

        .task-card.completed {
            background: rgba(255, 255, 255, 0.5); border-color: rgba(168, 84, 108, 0.1); opacity: 0.65;
        }

        .task-card.completed .task-title { text-decoration: line-through; color: var(--text-muted); }

        .task-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 8px; }
        .task-checkbox { width: 20px; height: 20px; border-radius: 6px; accent-color: var(--primary); cursor: pointer; margin-top: 2px; flex-shrink: 0; }
        .task-title { font-weight: 700; color: var(--text-main); font-size: 1rem; }
        .task-description { font-size: 0.86rem; color: var(--text-muted); margin-bottom: 16px; line-height: 1.4; }

        .task-difficulty {
            display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 12px; color: #FFFFFF; align-self: flex-start;
        }

        /* Paleta Pastel Profesional */
        .difficulty-easy { background: #5EC286; }
        .difficulty-medium { background: #EBA059; }
        .difficulty-hard { background: #E66767; }

        .task-reward {
            display: flex; align-items: center; gap: 6px; font-weight: 800; color: var(--primary); font-size: 0.95rem; margin-top: auto; padding-top: 10px; border-top: 1px dashed #F2E4E8;
        }

        /* === TIENDA === */
        #shop h2 { color: var(--text-main) !important; }
        
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }

        .shop-item {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 18px; padding: 22px; text-align: center; transition: all 0.3s ease; position: relative; box-shadow: var(--shadow-md); display: flex; flex-direction: column;
        }

        .shop-item:hover {
            border-color: var(--primary); box-shadow: var(--shadow-lg); transform: translateY(-5px);
        }

        .shop-item-image {
            width: 100%; height: 160px; background: #FFF5F7; border: 1.5px dashed #E2B6C3; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 18px; overflow: hidden;
        }

        .shop-item-image img { width: 100%; height: 100%; object-fit: cover; }
        .shop-item-name { font-size: 1.1rem; font-weight: 700; color: var(--text-main); margin-bottom: 6px; }
        .shop-item-description { font-size: 0.86rem; color: var(--text-muted); margin-bottom: 18px; flex: 1; display: flex; align-items: center; justify-content: center; }
        .shop-item-price { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 1.25rem; font-weight: 800; color: var(--primary); margin-bottom: 16px; }

        .buy-button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #C1738A); color: #FFFFFF; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; font-size: 0.95rem; box-shadow: 0 4px 12px rgba(168, 84, 108, 0.2);
        }

        .buy-button:hover:not(:disabled) {
            transform: translateY(-2px); box-shadow: 0 6px 16px rgba(168, 84, 108, 0.35); background: linear-gradient(135deg, var(--primary-hover), #AF5F76);
        }

        .buy-button:disabled { background: #E5D5DA; color: #9C8B90; box-shadow: none; cursor: not-allowed; }
        .shop-item.purchased { opacity: 0.7; border-color: #EAE0E3; }

        .purchased-badge {
            position: absolute; top: 14px; right: 14px; background: var(--text-main); color: #FFFFFF; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.5px; z-index: 2;
        }

        /* === ANIMACIONES === */
        .coin-animation {
            position: fixed; font-size: 1.6rem; font-weight: 800; color: #E6A15C; text-shadow: 0 2px 8px rgba(230, 161, 92, 0.4); pointer-events: none; z-index: 1000; animation: coinFloat 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes coinFloat {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            50% { transform: translateY(-45px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-70px) scale(0.9); }
        }

        .float-particle {
            position: fixed; pointer-events: none; z-index: 999; font-size: 1.5rem; animation: floatUp 1.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
        }

        /* === MODAL === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(45, 31, 36, 0.45); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: #FFFFFF; border-radius: 24px; padding: 42px 36px; text-align: center; max-width: 440px; width: 90%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border: 2px solid var(--primary-soft); animation: modalBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalBounce {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-title { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
        .modal-message { font-size: 1.05rem; color: var(--text-muted); margin-bottom: 28px; line-height: 1.5; }

        .modal-close {
            background: var(--text-main); color: #FFFFFF; border: none; padding: 14px 32px; border-radius: 12px; cursor: pointer; font-weight: 700; transition: all 0.2s ease; width: 100%;
        }

        .modal-close:hover { background: var(--primary); }

        .editable { cursor: text; border-radius: 6px; padding: 2px 6px; transition: background 0.2s ease; }
        .editable:hover { background: #FFF0F3; outline: 1px dashed #D6879E; }

        input[type="text"] {
            width: 100%; background: #FFF0F3; border: 1.5px solid var(--primary); color: var(--text-main); padding: 6px 10px; border-radius: 6px; font-family: inherit; font-size: inherit; font-weight: 600;
        }

        input[type="text"]:focus {
            outline: none; background: #FFFFFF; box-shadow: 0 0 0 3px rgba(168, 84, 108, 0.2);
        }

        @media (max-width: 768px) {
            .achievements-grid, .tasks-grid, .shop-grid { grid-template-columns: 1fr; }
            .global-header { flex-direction: column; gap: 16px; text-align: center; }
            .nav-tabs { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="global-header">
            <h1 class="header-title">✨ Sistema Completo</h1>
            <div class="coins-counter">
                <span class="coins-icon">💰</span>
                <span class="coins-value" id="totalCoins">0</span>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('achievements')">🏆 Logros</button>
            <button class="nav-tab" onclick="switchTab('tasks')">✅ Tareas</button>
            <button class="nav-tab" onclick="switchTab('shop')">🛍️ Tienda</button>
        </div>

        <section class="section active" id="achievements">
            <div class="achievements-grid" id="achievementsGrid"></div>
        </section>

        <section class="section" id="tasks">
            <div class="tasks-banner">
                <div class="banner-title">📋 Mis Tareas</div>
                <div class="banner-subtitle">Completa tareas para ganar monedas</div>
                <div class="banner-stats">
                    <div class="stat-item">
                        <span>Completadas:</span>
                        <span class="stat-value" id="tasksCompleted">0</span>
                        <span>/ <span id="totalTasks">30</span></span>
                    </div>
                    <div class="stat-item">
                        <span>Monedas ganadas en tareas:</span>
                        <span class="stat-value" id="tasksCoins">0</span>
                    </div>
                </div>
            </div>
            <div class="tasks-grid" id="tasksGrid"></div>
        </section>

        <section class="section" id="shop">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-size: 1.8rem; color: #1A1416; margin-bottom: 8px;">🛍️ Tienda</h2>
                <p style="color: #736368;">Compra objetos con tus monedas ganadas</p>
            </div>
            <div class="shop-grid" id="shopGrid"></div>
        </section>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-message" id="modalMessage"></div>
            <button class="modal-close" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script>
        const COINS_PER_ACHIEVEMENT = 10;
        const BADGE_URLS = {

            { title: "Tarea 28", description: "Tarea desafiante extra 3", difficulty: "hard", reward: 30 },
            { title: "Tarea 29", description: "Tarea desafiante extra 4", difficulty: "hard", reward: 30 },
            { title: "Tarea 30", description: "Tarea desafiante extra 5", difficulty: "hard", reward: 30 }
        ];
        const defaultShopItems = [
            { name: "Objeto 1", description: "Primer objeto de la tienda", price: 50, image: "./assets/shop/item1.png" },
            { name: "Objeto 2", description: "Segundo objeto de la tienda", price: 75, image: "./assets/shop/item2.png" },
            { name: "Objeto 3", description: "Tercer objeto de la tienda", price: 100, image: "./assets/shop/item3.png" },
            { name: "Objeto 4", description: "Cuarto objeto de la tienda", price: 120, image: "./assets/shop/item4.png" },
            { name: "Objeto 5", description: "Quinto objeto de la tienda", price: 150, image: "./assets/shop/item5.png" },
            { name: "Objeto 6", description: "Sexto objeto de la tienda", price: 200, image: "./assets/shop/item6.png" }
        ];
        let achievements = initializeData('achievements_complete_v1', defaultAchievements.map(a => ({ ...a, unlocked: false, image: null })));
        let tasks = initializeData('tasks_v1', defaultTasks.map(t => ({ ...t, completed: false })));
        let shopItems = initializeData('shop_v1', defaultShopItems.map(s => ({ ...s, purchased: false })));

        function initializeData(key, defaultData) {
            const saved = localStorage.getItem(key);
            return saved ? JSON.parse(saved) : defaultData;
        }

        function saveData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        function updateAllDisplay() {
            updateAchievements();
            updateTasks();
            updateShop();
            updateCoinsCounter();
        }

        function updateCoinsCounter() {
            const achievementCoins = achievements.filter(a => a.unlocked).length * COINS_PER_ACHIEVEMENT;
            const tasksCoins = tasks.filter(t => t.completed).reduce((sum, t) => sum + t.reward, 0);
            const totalCoins = achievementCoins + tasksCoins;
            document.getElementById('totalCoins').textContent = totalCoins;
        }

        function updateAchievements() {
            const grid = document.getElementById('achievementsGrid');
            grid.innerHTML = '';

            achievements.forEach((ach, index) => {
                const isHiddenAndLocked = ach.hidden && !ach.unlocked;
                const card = document.createElement('div');
                card.className = `achievement-card ${ach.unlocked ? 'unlocked' : 'locked'} ${isHiddenAndLocked ? 'hidden-achievement' : ''}`;

                if (isHiddenAndLocked) {
                    card.innerHTML = `
                        <div class="image-container no-image" style="background:#FAF8F9;">
                            <span>OCULTO</span>
                            <input type="file" class="image-input-wrapper" accept="image/*" onchange="handleImageUpload(event, ${index})">
                        </div>
                        <div class="card-content">
                            <img src="${ach.badgeUrl}" class="badge-img" alt="Insignia oculta">
                            <div class="card-text">
                                <div class="achievement-title">Logro no revelado</div>
                                <div class="achievement-desc">Continúa para descubrir</div>
                                <div class="achievement-stats">
                                    <div>
                                        <input type="checkbox" class="checkbox" onchange="toggleAchievement(${index}, this)">
                                        <span>+${COINS_PER_ACHIEVEMENT}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    const imageContainer = ach.image 
                        ? `<div class="image-container"><img src="${ach.image}" alt="${ach.title}"><input type="file" class="image-input-wrapper" accept="image/*" onchange="handleImageUpload(event, ${index})"></div>`
                        : `<div class="image-container no-image"><span>Adjuntar imagen</span><input type="file" class="image-input-wrapper" accept="image/*" onchange="handleImageUpload(event, ${index})"></div>`;

                    card.innerHTML = `
                        ${imageContainer}
                        ${!ach.unlocked ? '<div class="locked-overlay">Pendiente</div>' : ''}
                        
                        <div class="card-content">
                            <img src="${ach.badgeUrl}" class="badge-img" alt="Insignia">
                            <div class="card-text">
                                <div class="achievement-title editable" ondblclick="editAchievementTitle(${index}, this)">${ach.title}</div>
                                <div class="achievement-desc editable" ondblclick="editAchievementDesc(${index}, this)">${ach.description}</div>
                                <div class="achievement-stats">
                                    <span>${ach.percentage}%</span>
                                    <label>
                                        <input type="checkbox" class="checkbox" ${ach.unlocked ? 'checked' : ''} onchange="toggleAchievement(${index}, this)">
                                        +${COINS_PER_ACHIEVEMENT}
                                    </label>
                                </div>
                            </div>
                        </div>
                    `;
                }
                grid.appendChild(card);
            });
        }

        function updateTasks() {
            const grid = document.getElementById('tasksGrid');
            grid.innerHTML = '';

            tasks.forEach((task, index) => {
                const card = document.createElement('div');
                card.className = `task-card ${task.completed ? 'completed' : ''}`;

                card.innerHTML = `
                    <div class="task-header">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index}, this)">
                        <div class="task-title editable" ondblclick="editTaskTitle(${index}, this)">${task.title}</div>
                    </div>
                    <div class="task-description editable" ondblclick="editTaskDesc(${index}, this)">${task.description}</div>
                    <div class="task-difficulty difficulty-${task.difficulty}">${task.difficulty.toUpperCase()}</div>
                    <div class="task-reward">💰 +${task.reward}</div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('tasksCompleted').textContent = tasks.filter(t => t.completed).length;
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('tasksCoins').textContent = tasks.filter(t => t.completed).reduce((sum, t) => sum + t.reward, 0);
        }

        function updateShop() {
            const grid = document.getElementById('shopGrid');
            grid.innerHTML = '';

            const totalCoins = getTotalCoins();

            shopItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `shop-item ${item.purchased ? 'purchased' : ''}`;

                const imageContainer = item.image 
                    ? `<div class="shop-item-image"><img src="${item.image}" alt="${item.name}"></div>`
                    : `<div class="shop-item-image" style="color: #968389; font-size: 3rem;">📦</div>`;

                card.innerHTML = `
                    ${item.purchased ? '<div class="purchased-badge">✓ Comprado</div>' : ''}
                    ${imageContainer}
                    <div class="shop-item-name editable" ondblclick="editShopName(${index}, this)">${item.name}</div>
                    <div class="shop-item-description editable" ondblclick="editShopDesc(${index}, this)">${item.description}</div>
                    <div class="shop-item-price">
                        <span>💰 ${item.price}</span>
                    </div>
                    <button class="buy-button" onclick="buyItem(${index})" ${item.purchased || totalCoins < item.price ? 'disabled' : ''}>
                        ${item.purchased ? 'Comprado' : 'Comprar'}
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function getTotalCoins() {
            const achievementCoins = achievements.filter(a => a.unlocked).length * COINS_PER_ACHIEVEMENT;
            const tasksCoins = tasks.filter(t => t.completed).reduce((sum, t) => sum + t.reward, 0);
            return achievementCoins + tasksCoins;
        }

        function toggleAchievement(index, checkbox) {
            achievements[index].unlocked = checkbox.checked;
            if (checkbox.checked) animateCoins(checkbox, 10);
            saveData('achievements_complete_v1', achievements);
            updateAllDisplay();
        }

        function toggleTask(index, checkbox) {
            tasks[index].completed = checkbox.checked;
            if (checkbox.checked) animateCoins(checkbox, tasks[index].reward);
            saveData('tasks_v1', tasks);
            updateAllDisplay();
        }

        function buyItem(index) {
            const totalCoins = getTotalCoins();
            if (totalCoins >= shopItems[index].price && !shopItems[index].purchased) {
                shopItems[index].purchased = true;
                saveData('shop_v1', shopItems);
                showModal('🎉 Compra Exitosa', `¡Obtuviste "${shopItems[index].name}"! 🎁`);
                updateAllDisplay();
            }
        }

        function animateCoins(element, amount) {
            const rect = element.getBoundingClientRect();
            const coin = document.createElement('div');
            coin.className = 'coin-animation';
            coin.textContent = `+${amount}`;
            coin.style.left = rect.left + 'px';
            coin.style.top = rect.top + 'px';
            document.body.appendChild(coin);
            setTimeout(() => coin.remove(), 1500);
        }

        function handleImageUpload(event, index) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    achievements[index].image = e.target.result;
                    saveData('achievements_complete_v1', achievements);
                    updateAchievements();
                };
                reader.readAsDataURL(file);
            }
        }

        function editAchievementTitle(index, el) {
            const current = achievements[index].title;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            el.replaceWith(input);
            input.focus();
            const save = () => {
                achievements[index].title = input.value || current;
                saveData('achievements_complete_v1', achievements);
                updateAchievements();
            };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') save(); });
        }

        function editAchievementDesc(index, el) {
            const current = achievements[index].description;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            el.replaceWith(input);
            input.focus();
            const save = () => {
                achievements[index].description = input.value || current;
                saveData('achievements_complete_v1', achievements);
                updateAchievements();
            };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') save(); });
        }

        function editTaskTitle(index, el) {
            const current = tasks[index].title;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            el.replaceWith(input);
            input.focus();
            const save = () => {
                tasks[index].title = input.value || current;
                saveData('tasks_v1', tasks);
                updateTasks();
            };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') save(); });
        }

        function editTaskDesc(index, el) {
            const current = tasks[index].description;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            el.replaceWith(input);
            input.focus();
            const save = () => {
                tasks[index].description = input.value || current;
                saveData('tasks_v1', tasks);
                updateTasks();
            };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') save(); });
        }

        function editShopName(index, el) {
            const current = shopItems[index].name;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            el.replaceWith(input);
            input.focus();
            const save = () => {
                shopItems[index].name = input.value || current;
                saveData('shop_v1', shopItems);
                updateShop();
            };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') save(); });
        }

        function editShopDesc(index, el) {
            const current = shopItems[index].description;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            el.replaceWith(input);
            input.focus();
            const save = () => {
                shopItems[index].description = input.value || current;
                saveData('shop_v1', shopItems);
                updateShop();
            };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') save(); });
        }

        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function showModal(title, message) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        updateAllDisplay();
    </script>
</body>
</html>
